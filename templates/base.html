<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Photo Gallery{% endblock %}</title>

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Playfair Display for headings, DM Sans for body -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    body        { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3  { font-family: 'Playfair Display', serif; }

    /* Subtle grain overlay for depth */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* Card hover lift */
    .photo-card {
      transition: transform 0.3s cubic-bezier(.25,.8,.25,1),
                  box-shadow 0.3s cubic-bezier(.25,.8,.25,1);
    }
    .photo-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Image zoom on hover */
    .photo-card .card-img {
      transition: transform 0.5s cubic-bezier(.25,.8,.25,1);
      overflow: hidden;
    }
    .photo-card:hover .card-img img {
      transform: scale(1.06);
    }

    /* Fade in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }
  </style>
</head>
<body class="min-h-screen bg-base-300 text-base-content">

  <!-- Navbar -->
  <nav class="navbar bg-base-100/70 backdrop-blur-md sticky top-0 z-50 border-b border-base-content/10 px-6">
    <div class="flex-1">
      <a href="{% url 'gallery-list' %}" class="text-2xl font-bold tracking-tight" style="font-family:'Playfair Display',serif;">
        📷 Gallery
      </a>
    </div>
    <div class="flex-none gap-4">
      <span class="text-sm text-base-content/50">Powered by Telegram</span>
      <a href="/admin/" class="btn btn-sm btn-outline">Admin</a>
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-7xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer footer-center p-6 bg-base-100/40 text-base-content/40 text-sm mt-20 border-t border-base-content/10">
    <p>Images stored on Telegram · Built with Django</p>
  </footer>

</body>
</html>
